<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - SupportMailAgent</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1>📬 Email Inbox</h1>
                        <p>View all received emails and AI responses</p>
                    </div>
                    <a href="/" style="color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 6px; font-weight: 600;">
                        ← Back to Composer
                    </a>
                </div>
            </div>
        </header>

        <div class="inbox-layout">
            <!-- Main Inbox View -->
            <div class="inbox-main">
                <div class="inbox-filters">
                    <h2>All Emails</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="auto">✓ Auto-Reply</button>
                        <button class="filter-btn" data-filter="escalated">🚨 Escalated</button>
                    </div>
                    <div style="margin-left: auto;">
                        <span id="inboxCount" class="email-count">0 emails</span>
                    </div>
                </div>

                <div id="inboxContent" class="inbox-content">
                    <div class="empty-state">
                        <p>No emails yet</p>
                        <p style="font-size: 12px; color: #999;">Go to Composer to send test emails</p>
                    </div>
                </div>
            </div>

            <!-- Email Details Sidebar -->
            <div class="inbox-details">
                <div id="detailsPanel" class="details-panel-full">
                    <div class="empty-state">
                        <p>Select an email to view details</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class InboxViewer {
            constructor() {
                this.emails = [];
                this.selectedEmailId = null;
                this.currentFilter = 'all';

                this.initElements();
                this.attachEventListeners();
                this.loadEmails();

                // Auto-refresh every 2 seconds
                setInterval(() => this.loadEmails(), 2000);
            }

            initElements() {
                this.inboxContent = document.getElementById('inboxContent');
                this.inboxCount = document.getElementById('inboxCount');
                this.detailsPanel = document.getElementById('detailsPanel');
            }

            attachEventListeners() {
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.getAttribute('data-filter');
                        this.updateInboxList();
                    });
                });
            }

            async loadEmails() {
                try {
                    const response = await fetch('/emails/');
                    if (!response.ok) throw new Error('Failed to load emails');

                    const data = await response.json();
                    const emailsArray = Object.entries(data.emails || {}).map(([id, content]) => ({
                        id,
                        ...content,
                    }));

                    this.emails = emailsArray.sort((a, b) =>
                        new Date(b.timestamp) - new Date(a.timestamp)
                    );

                    this.updateInboxList();
                    this.updateCount();
                } catch (error) {
                    console.error('Error loading emails:', error);
                }
            }

            updateCount() {
                const count = this.emails.length;
                this.inboxCount.textContent = `${count} email${count !== 1 ? 's' : ''}`;
            }

            updateInboxList() {
                const filtered = this.emails.filter(email => {
                    if (this.currentFilter === 'all') return true;
                    if (this.currentFilter === 'auto') return !email.workflow.should_escalate;
                    if (this.currentFilter === 'escalated') return email.workflow.should_escalate;
                    return true;
                });

                if (filtered.length === 0) {
                    this.inboxContent.innerHTML = `
                        <div class="empty-state">
                            <p>No emails in this filter</p>
                        </div>
                    `;
                    return;
                }

                this.inboxContent.innerHTML = filtered.map(email => `
                    <div class="inbox-email-card ${this.selectedEmailId === email.id ? 'active' : ''} ${email.workflow.should_escalate ? 'escalated' : ''}"
                         data-email-id="${email.id}">
                        <div class="email-card-header">
                            <div>
                                <div class="email-sender">${this.escapeHtml(email.input.sender)}</div>
                                <div class="email-subject">${this.escapeHtml(email.input.subject)}</div>
                            </div>
                            <div class="email-status">
                                ${email.workflow.should_escalate ?
                                    '<span class="badge-escalated">🚨 Escalated</span>' :
                                    '<span class="badge-auto">✓ Auto</span>'}
                            </div>
                        </div>
                        <div class="email-card-meta">
                            <span class="intent-badge" style="background: ${this.getIntentColor(email.workflow.intent)};">
                                ${this.escapeHtml(email.workflow.intent)}
                            </span>
                            <span class="confidence">${Math.round(email.workflow.confidence * 100)}% confidence</span>
                            <span class="timestamp">${new Date(email.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="email-preview">${this.escapeHtml(email.input.body.substring(0, 100))}...</div>
                    </div>
                `).join('');

                // Add click listeners
                this.inboxContent.querySelectorAll('.inbox-email-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const emailId = card.getAttribute('data-email-id');
                        this.selectEmail(emailId);
                    });
                });
            }

            selectEmail(emailId) {
                this.selectedEmailId = emailId;
                this.updateInboxList();
                this.showEmailDetails(emailId);
            }

            showEmailDetails(emailId) {
                const email = this.emails.find(e => e.id === emailId);
                if (!email) {
                    this.detailsPanel.innerHTML = '<div class="empty-state"><p>Email not found</p></div>';
                    return;
                }

                const workflow = email.workflow;
                const input = email.input;
                const response = email.email;
                const confidencePercent = Math.round(workflow.confidence * 100);
                const confidenceLevel = confidencePercent >= 70 ? 'high' : confidencePercent >= 40 ? 'medium' : 'low';

                const kbResultsHtml = workflow.kb_results && workflow.kb_results.length > 0
                    ? `<div class="kb-results">
                        ${workflow.kb_results.slice(0, 5).map(result => `
                            <div class="kb-result">
                                <span class="kb-result-id">${this.escapeHtml(result.id)}</span>
                                <span class="kb-result-score">${Math.round(result.similarity * 100)}% match</span>
                                <div class="kb-result-preview">${this.escapeHtml(result.content.substring(0, 100))}...</div>
                            </div>
                        `).join('')}
                      </div>`
                    : '<div class="kb-results"><em style="color: var(--gray-500);">No KB results found</em></div>';

                this.detailsPanel.innerHTML = `
                    <div class="details-scroll">
                        <div class="details-section">
                            <div class="section-title">📧 RECEIVED EMAIL</div>
                            <div class="detail-row">
                                <span class="detail-label">From:</span>
                                <span class="detail-value">${this.escapeHtml(input.sender)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Subject:</span>
                                <span class="detail-value">${this.escapeHtml(input.subject)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Message:</span>
                            </div>
                            <div class="response-box">${this.escapeHtml(input.body)}</div>
                        </div>

                        <div class="details-section">
                            <div class="section-title">⚙️ AI WORKFLOW ANALYSIS</div>
                            <div class="detail-row">
                                <span class="detail-label">Intent:</span>
                                <span class="detail-value">${this.escapeHtml(workflow.intent || 'unknown')}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Confidence:</span>
                                <span class="detail-value">${confidencePercent}%</span>
                                <div class="confidence-bar">
                                    <div class="confidence-fill ${confidenceLevel}" style="width: ${confidencePercent}%"></div>
                                </div>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Action:</span>
                                <span class="detail-value ${workflow.should_escalate ? 'escalated' : 'auto'}">
                                    ${workflow.should_escalate ? '🚨 Escalated to Human Team' : '✓ Auto-Reply Sent'}
                                </span>
                            </div>
                            ${workflow.followup_scheduled ? `
                                <div class="detail-row">
                                    <span class="detail-label">Follow-up:</span>
                                    <span class="detail-value">📅 Scheduled (24h)</span>
                                </div>
                            ` : ''}
                        </div>

                        <div class="details-section">
                            <div class="section-title">🔍 KB SEARCH RESULTS</div>
                            ${kbResultsHtml}
                        </div>

                        <div class="details-section">
                            <div class="section-title">💬 AI RESPONSE SENT</div>
                            <div class="detail-row">
                                <span class="detail-label">To:</span>
                                <span class="detail-value">${this.escapeHtml(response.recipient)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Subject:</span>
                                <span class="detail-value">${this.escapeHtml(response.subject)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Message:</span>
                            </div>
                            <div class="response-box">${this.escapeHtml(response.body)}</div>
                        </div>

                        <div class="details-section">
                            <div class="section-title">📋 METADATA</div>
                            <div class="detail-row">
                                <span class="detail-label">Email ID:</span>
                                <span class="detail-value" style="font-family: monospace; font-size: 10px;">${this.escapeHtml(email.id)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Received:</span>
                                <span class="detail-value">${new Date(email.timestamp).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            getIntentColor(intent) {
                const colors = {
                    'billing': '#3b82f6',
                    'technical': '#f59e0b',
                    'general': '#10b981',
                    'complaint': '#ef4444',
                    'urgent': '#dc2626'
                };
                return colors[intent] || '#6b7280';
            }

            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new InboxViewer();
        });
    </script>

    <style>
        .inbox-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1px;
            flex: 1;
            overflow: hidden;
            background: white;
        }

        .inbox-main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--gray-200);
        }

        .inbox-filters {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            flex-shrink: 0;
        }

        .inbox-filters h2 {
            margin: 0;
            font-size: 18px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid var(--gray-300);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .inbox-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .inbox-email-card {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--gray-200);
            border-left: 4px solid var(--gray-300);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .inbox-email-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .inbox-email-card.active {
            background: var(--primary-color);
            color: white;
            border-left-color: white;
            border-color: var(--primary-color);
        }

        .inbox-email-card.escalated {
            border-left-color: var(--danger-color);
        }

        .inbox-email-card.active.escalated {
            border-left-color: white;
        }

        .email-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .email-card-header > div:first-child {
            flex: 1;
        }

        .email-sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .email-subject {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .email-status {
            white-space: nowrap;
        }

        .email-card-meta {
            display: flex;
            gap: 8px;
            font-size: 11px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .intent-badge {
            padding: 2px 6px;
            border-radius: 3px;
            color: white;
            font-weight: 500;
        }

        .confidence {
            opacity: 0.7;
        }

        .timestamp {
            opacity: 0.6;
            font-size: 10px;
        }

        .email-preview {
            font-size: 11px;
            opacity: 0.6;
            line-height: 1.3;
        }

        .inbox-details {
            overflow: hidden;
            background: var(--gray-50);
            display: flex;
            flex-direction: column;
        }

        .details-panel-full {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .details-scroll {
            padding: 0;
        }

        @media (max-width: 1200px) {
            .inbox-layout {
                grid-template-columns: 1fr;
            }

            .inbox-details {
                display: none;
            }
        }
    </style>
</body>
</html>
